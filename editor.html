<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personalise Your Card</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root { --dark:#1e1e24; --border:#e0e0e0; --accent:#1A73E8; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Helvetica Neue',Arial,sans-serif; background:#f6f6f8; color:var(--dark); }

  .workspace { display:flex; gap:40px; max-width:1280px; margin:40px auto; padding:0 40px; align-items:flex-start; }

  #canvas-wrapper { background:#fff; padding:15px; border:1px solid var(--border); border-radius:8px; box-shadow:0 4px 12px rgba(0,0,0,.05); }
  #canvas { border:1px solid #e2e2e2; }

  .controls { width:360px; background:#fff; padding:30px; border:1px solid var(--border); border-radius:8px; box-shadow:0 4px 12px rgba(0,0,0,.05); }
  .controls h2 { margin:0 0 25px; font-size:22px; font-weight:300; }

  .page-toggle { display:flex; gap:10px; margin-bottom:25px; }
  .toggle-btn { flex:1; padding:12px; border:1px solid #ccc; background:#fff; border-radius:6px; font-size:13px; font-weight:bold; cursor:pointer; transition:.2s; }
  .toggle-btn.active { background:#111; color:#fff; border-color:#111; }

  .control-group { display:none; flex-direction:column; gap:15px; }
  .control-group.active { display:flex; }

  label { font-size:12px; font-weight:bold; text-transform:uppercase; letter-spacing:.5px; color:#444; }
  input[type=text] { width:100%; padding:12px; border:1px solid #ccc; border-radius:6px; font-size:14px; }
  .flex-row { display:flex; align-items:center; gap:10px; }
  .color-picker { width:50px; height:40px; padding:0; border:1px solid #ccc; border-radius:6px; cursor:pointer; }
  .size-slider { flex:1; }
  .hint { font-size:13px; color:#666; margin:0; }

  .btn { width:100%; padding:15px; margin-top:20px; border:none; border-radius:6px; font-size:14px; font-weight:bold; letter-spacing:1px; text-transform:uppercase; cursor:pointer; }
  .btn-buy { background:#1a1a1a; color:#fff; }
  .btn-buy:hover { background:#444; }
  .btn-buy:disabled { background:#ccc; cursor:not-allowed; }
  .btn-download { background:#fff; color:#1a1a1a; border:1px solid #1a1a1a; margin-top:10px; }
  .btn-download:hover { background:#1a1a1a; color:#fff; }
  .btn-download:disabled { opacity:.5; cursor:not-allowed; }
  .btn-cancel { background:#f0f0f0; color:#333; margin-top:10px; }

  @media (max-width:900px){ .workspace{ flex-direction:column; align-items:center; } .controls{ width:100%; max-width:595px; } }
</style>
</head>
<body>

  <div class="workspace">
    <div id="canvas-wrapper">
      <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
      <h2>Personalise Card</h2>

      <div class="page-toggle">
        <button id="toggle-front"  class="toggle-btn active" onclick="switchPage('front')">Outside</button>
        <button id="toggle-inside" class="toggle-btn"        onclick="switchPage('inside')">Inside</button>
      </div>

      <!-- FRONT COVER controls (right panel of the outside spread) -->
      <div id="front-controls" class="control-group active">
        <div id="front-name-block">
          <label for="name-input">Name to add</label>
          <input type="text" id="name-input" placeholder="e.g. HARRY" oninput="updateName(this.value)">
        </div>

        <div id="front-color-block">
          <label>Text colour</label>
          <div class="flex-row">
            <input type="color" id="front-color" class="color-picker" value="#FD7D96" onchange="setFrontColor(this.value)">
            <span class="hint">Choose font colour</span>
          </div>
        </div>

        <div id="front-size-block">
          <label>Font size</label>
          <div class="flex-row">
            <input type="range" id="front-size" class="size-slider" min="20" max="120" value="52" oninput="setFrontSize(this.value)">
            <span id="front-size-val" class="hint">52px</span>
          </div>
        </div>
      </div>

      <!-- INSIDE controls (right panel of the inside spread) -->
      <div id="inside-controls" class="control-group">
        <p class="hint">The left panel stays blank. Click a text box on the right to write your message.</p>

        <label>Font size</label>
        <div class="flex-row">
          <input type="range" id="inside-size" class="size-slider" min="15" max="80" value="45" oninput="setInsideSize(this.value)">
          <span id="inside-size-val" class="hint">45px</span>
        </div>

        <label>Font colour</label>
        <div class="flex-row">
          <input type="color" id="inside-color" class="color-picker" value="#000000" onchange="setInsideColor(this.value)">
          <span class="hint">Choose inside colour</span>
        </div>
      </div>

      <button class="btn btn-buy" onclick="checkout()">Buy Now</button>
      <button class="btn btn-download" onclick="downloadPDF()">Download PDF Preview</button>
      <button class="btn btn-cancel" onclick="location.href='shop-cards.html'">Cancel &amp; Return</button>
    </div>
  </div>

<script>
/* ============================================================================
   GREETING CARD EDITOR — panel logic

   One A4 landscape sheet (1191 x 840), printed both sides, folded once.

     OUTSIDE spread            INSIDE spread
   ┌─────────┬─────────┐     ┌─────────┬─────────┐
   │  back   │  front  │     │ inside  │ inside  │
   │ (logo)  │ (design)│     │  left   │  right  │
   │ FIXED   │ EDIT ✎  │     │ BLANK   │ EDIT ✎  │
   └─────────┴─────────┘     └─────────┴─────────┘
        left     right            left     right

   The customer edits ONLY the two right panels (front + inside-right).
   The editor viewport is cropped to the right panel so the left half is
   never shown. The left half still exists in the 1191-wide coordinate space
   and is included when we render the full spread for print.
============================================================================ */

/* ---- print / checkout config -------------------------------------------- */
const CLOUDINARY_CLOUD_NAME   = "uzf4eeky";
const CLOUDINARY_UPLOAD_PRESET = "YOUR_UPLOAD_PRESET_HERE";   // <-- set this
const LOGO_URL = "https://res.cloudinary.com/uzf4eeky/image/upload/v1784098145/logo.png";

/* ---- geometry ------------------------------------------------------------ */
const CANVAS_WIDTH = 1191, CANVAS_HEIGHT = 840;   // full A4 landscape spread
const PANEL_WIDTH  = CANVAS_WIDTH / 2;            // 595.5 — one panel
const PRINT_MULTIPLIER = 2.95;                    // 1191px * 2.95 ≈ 300 DPI

// Inside message boxes (positioned within the RIGHT panel)
const BOX_W = 495, BOX_H = 225, BOX_LEFT = PANEL_WIDTH + 50;
const BOX_Y = { top: 40, middle: 305, bottom: 570 };

const STYLE_DASHED = { borderColor:"#cccccc", borderDashArray:[4,4], strokeWidth:1.5 };
const STYLE_SOLID  = { borderColor:"#1A73E8", borderDashArray:null,  strokeWidth:2   };

/* ---- card templates ------------------------------------------------------
   `name` = editable front text config, or null for a card with no name.    */
const CARD_TEMPLATES = {
  "thankyou-teacher": {
    url: "https://res.cloudinary.com/uzf4eeky/image/upload/v1784058119/thankyou-teacher_vnh8yv.png",
    name: { left: 900, top: 725, startSize: 52, minSize: 35, maxSize: 68, color: "#FD7D96", fontFamily: "BubblegumSans" }
  },
  "new-home": {
    url: "https://res.cloudinary.com/uzf4eeky/image/upload/v1784058157/new-home_wgtf1r.png",
    name: null   // no personalisation on the front
  }
};

/* ---- state --------------------------------------------------------------- */
let canvas, template, currentPage = "front";
let frontDesign, backLogo, nameText;
let leftBlank, rightBlank, boxTop, boxMid, boxBot;     // inside objects
let msgTop, msgMid, msgBot;                            // inside editable text

/* ---- boot ---------------------------------------------------------------- */
window.addEventListener("DOMContentLoaded", () => {
  const id = new URLSearchParams(location.search).get("card") || "thankyou-teacher";
  template = CARD_TEMPLATES[id];
  if (!template) { location.href = "shop-cards.html"; return; }
  initEditor();
});

function initEditor() {
  const el = document.getElementById("canvas");
  // Canvas element is only ONE panel wide — the editor shows the right half.
  el.width = PANEL_WIDTH; el.height = CANVAS_HEIGHT;

  canvas = new fabric.Canvas(el, {
    width: PANEL_WIDTH, height: CANVAS_HEIGHT,
    backgroundColor: "#ffffff", preserveObjectStacking: true
  });

  // Pan so logical x = PANEL_WIDTH..CANVAS_WIDTH (the right half) is on screen.
  canvas.setViewportTransform([1, 0, 0, 1, -PANEL_WIDTH, 0]);
  canvas.calcOffset();

  // Show/hide front controls depending on whether this card has a name.
  document.getElementById("front-name-block").style.display  = template.name ? "block" : "none";
  document.getElementById("front-color-block").style.display = template.name ? "block" : "none";
  document.getElementById("front-size-block").style.display  = template.name ? "block" : "none";

  buildBackLogo();
  buildFrontDesign();   // adds inside objects once the design has loaded
}

/* ---- OUTSIDE: back cover logo (left panel, fixed) ------------------------ */
function buildBackLogo() {
  fabric.Image.fromURL(LOGO_URL, img => {
    backLogo = img;
    backLogo.set({
      left: PANEL_WIDTH / 2, top: 710, originX: "center", originY: "center",
      scaleX: 0.15, scaleY: 0.15, selectable: false, evented: false
    });
    canvas.add(backLogo); canvas.sendToBack(backLogo);
  }, { crossOrigin: "anonymous" });
}

/* ---- OUTSIDE: front cover design + editable name (right panel) ----------- */
function buildFrontDesign() {
  fabric.Image.fromURL(template.url, img => {
    frontDesign = img;
    frontDesign.set({
      left: PANEL_WIDTH, top: 0,
      scaleX: PANEL_WIDTH  / img.width,
      scaleY: CANVAS_HEIGHT / img.height,
      selectable: false, evented: false
    });
    canvas.add(frontDesign); canvas.sendToBack(frontDesign);

    if (template.name) {
      const n = template.name;
      nameText = new fabric.Text("NAME", {
        left: n.left, top: n.top, originX: "center", originY: "center",
        fontSize: n.startSize, fontFamily: n.fontFamily || "Arial",
        fontWeight: "bold", fill: n.color, textAlign: "center",
        selectable: false, evented: false
      });
      canvas.add(nameText);

      const s = document.getElementById("front-size");
      s.min = n.minSize; s.max = n.maxSize; s.value = n.startSize;
      document.getElementById("front-size-val").innerText = n.startSize + "px";
      document.getElementById("front-color").value = n.color;
    }

    buildInside();
    switchPage("front");
  }, { crossOrigin: "anonymous" });
}

/* ---- INSIDE: blank left + three editable message boxes on the right ------ */
function buildInside() {
  leftBlank  = new fabric.Rect({ left: 0,           top: 0, width: PANEL_WIDTH, height: CANVAS_HEIGHT, fill: "#ffffff", selectable:false, evented:false, visible:false });
  rightBlank = new fabric.Rect({ left: PANEL_WIDTH, top: 0, width: PANEL_WIDTH, height: CANVAS_HEIGHT, fill: "#ffffff", selectable:false, evented:false, visible:false });

  const boxBase = { width: BOX_W, height: BOX_H, left: BOX_LEFT, fill:"#fcfcfc", rx:8, ry:8, selectable:false, evented:false, visible:false };
  boxTop = new fabric.Rect({ ...boxBase, top: BOX_Y.top });
  boxMid = new fabric.Rect({ ...boxBase, top: BOX_Y.middle });
  boxBot = new fabric.Rect({ ...boxBase, top: BOX_Y.bottom });

  const textBase = {
    width: BOX_W, left: BOX_LEFT, textAlign:"center", fontFamily:"Arial", fill:"#000000",
    visible:false, hasControls:false, lockMovementX:true, lockMovementY:true,
    lockScalingX:true, lockScalingY:true, splitByGrapheme:true, ...STYLE_DASHED
  };
  msgTop = new fabric.Textbox("Add Message Here",                 { ...textBase, top: BOX_Y.top,    fontSize: 45 });
  msgMid = new fabric.Textbox("Happy Birthday!\nHave a great day!",{ ...textBase, top: BOX_Y.middle, fontSize: 45 });
  msgBot = new fabric.Textbox("Add Message Here",                 { ...textBase, top: BOX_Y.bottom, fontSize: 45 });

  canvas.add(leftBlank, rightBlank, boxTop, boxMid, boxBot, msgTop, msgMid, msgBot);
  wireInsideEvents();
}

/* ---- front editing ------------------------------------------------------- */
function updateName(v)      { if (nameText){ nameText.set({ text: v.toUpperCase() || "NAME" }); canvas.requestRenderAll(); } }
function setFrontColor(hex) { if (nameText){ nameText.set({ fill: hex }); canvas.requestRenderAll(); } }
function setFrontSize(px)   {
  document.getElementById("front-size-val").innerText = px + "px";
  if (nameText){ nameText.set({ fontSize: Number(px) }); canvas.requestRenderAll(); }
}

/* ---- inside editing ------------------------------------------------------ */
const insideTexts = () => [msgTop, msgMid, msgBot];
const isInsideText = o => insideTexts().includes(o);

function setInsideSize(px) {
  document.getElementById("inside-size-val").innerText = px + "px";
  const a = canvas.getActiveObject();
  if (isInsideText(a)) { a.set({ fontSize: Number(px) }); canvas.requestRenderAll(); }
}
function setInsideColor(hex) {
  const a = canvas.getActiveObject();
  if (isInsideText(a)) { a.set({ fill: hex }); canvas.requestRenderAll(); }
}
function resetInsideBorders() { insideTexts().forEach(t => t && t.set(STYLE_DASHED)); }

function wireInsideEvents() {
  canvas.on("mouse:down", opt => {
    if (currentPage !== "inside") return;
    const t = opt.target;
    if (isInsideText(t)) {
      resetInsideBorders();
      t.set(STYLE_SOLID);
      document.getElementById("inside-size").value = t.fontSize;
      document.getElementById("inside-size-val").innerText = t.fontSize + "px";
      document.getElementById("inside-color").value = t.fill;
      canvas.requestRenderAll();
    }
  });
  // Clear the placeholder text the moment the customer starts typing.
  canvas.on("text:editing:entered", e => {
    if (e.target.text === "Add Message Here") {
      e.target.text = ""; e.target.hiddenTextarea.value = "";
      canvas.requestRenderAll();
    }
  });
}

/* ---- page toggle --------------------------------------------------------- */
function switchPage(page) {
  currentPage = page;
  const front = page === "front", inside = page === "inside";

  document.getElementById("toggle-front").classList.toggle("active", front);
  document.getElementById("toggle-inside").classList.toggle("active", inside);
  document.getElementById("front-controls").classList.toggle("active", front);
  document.getElementById("inside-controls").classList.toggle("active", inside);

  // Outside objects
  [backLogo, frontDesign, nameText].forEach(o => o && o.set({ visible: front }));
  // Inside objects
  [leftBlank, rightBlank, boxTop, boxMid, boxBot, msgTop, msgMid, msgBot]
    .forEach(o => o && o.set({ visible: inside }));

  canvas.discardActiveObject();
  resetInsideBorders();
  canvas.requestRenderAll();
}

/* ---- render the FULL folded spread at print resolution ------------------- */
function captureFullSpread() {
  const editorVpt = canvas.viewportTransform.slice();
  canvas.setWidth(CANVAS_WIDTH);
  canvas.setViewportTransform([1, 0, 0, 1, 0, 0]);   // show whole 1191 spread
  canvas.requestRenderAll();

  let dataUrl;
  try {
    dataUrl = canvas.toDataURL({ format:"png", quality:1.0, multiplier: PRINT_MULTIPLIER });
  } catch (e) {
    // Restore the editor view before surfacing the error.
    canvas.setWidth(PANEL_WIDTH);
    canvas.setViewportTransform(editorVpt);
    canvas.calcOffset();
    canvas.requestRenderAll();
    throw new Error(
      "Canvas is tainted (cross-origin image). Make sure every card/logo image " +
      "loads with crossOrigin:'anonymous' and that the host sends CORS headers. " +
      "Original: " + e.message
    );
  }

  canvas.setWidth(PANEL_WIDTH);                        // restore cropped editor
  canvas.setViewportTransform(editorVpt);
  canvas.calcOffset();
  canvas.requestRenderAll();
  return dataUrl;
}

/* ---- render both print-ready spreads ------------------------------------ */
// Returns { outside, inside } as full-spread PNG data URLs with placeholder
// boxes and selection borders hidden (a clean print/preview render).
function generateSpreads() {
  switchPage("front");
  const outside = captureFullSpread();

  switchPage("inside");
  resetInsideBorders();
  [boxTop, boxMid, boxBot].forEach(b => b.set({ visible: false }));
  insideTexts().forEach(t => t.set({ borderColor: "transparent", borderDashArray: null }));
  canvas.discardActiveObject(); canvas.requestRenderAll();
  const inside = captureFullSpread();
  [boxTop, boxMid, boxBot].forEach(b => b.set({ visible: true }));   // restore

  return { outside, inside };
}

/* ---- download a 2-page A4 landscape PDF (outside + inside) --------------- */
function downloadPDF() {
  const btn = document.querySelector(".btn-download");
  btn.disabled = true; btn.innerText = "Building PDF…";
  try {
    const { outside, inside } = generateSpreads();
    const jsPDF = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
    if (!jsPDF) throw new Error("jsPDF failed to load. Check the CDN script tag.");

    // A4 landscape = 297 x 210 mm. Each spread fills a full page; fold in half.
    const pdf = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
    pdf.addImage(outside, "PNG", 0, 0, 297, 210);   // page 1 — back | front
    pdf.addPage();
    pdf.addImage(inside,  "PNG", 0, 0, 297, 210);   // page 2 — blank | message

    pdf.save("greeting-card-preview.pdf");
  } catch (err) {
    console.error(err);
    alert("Could not build PDF: " + err.message);
  } finally {
    btn.disabled = false; btn.innerText = "Download PDF Preview";
  }
}

/* ---- checkout ------------------------------------------------------------ */
async function checkout() {
  const btn = document.querySelector(".btn-buy");
  btn.disabled = true; btn.innerText = "Generating pages…";

  try {
    const { outside, inside } = generateSpreads();

    // If Cloudinary isn't configured yet, download the artwork to test.
    if (CLOUDINARY_UPLOAD_PRESET === "YOUR_UPLOAD_PRESET_HERE") {
      download(outside, "card-outside.png");
      download(inside,  "card-inside.png");
      alert("Cloudinary not configured — downloaded the two print files instead so you can preview them.");
      return;
    }

    btn.innerText = "Uploading…";
    const p1 = await uploadToCloudinary(outside);
    const p2 = await uploadToCloudinary(inside);
    if (!p1?.secure_url || !p2?.secure_url) throw new Error("Upload failed");

    btn.innerText = "Connecting checkout…";
    const res = await fetch("/.netlify/functions/create-checkout", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: nameText ? nameText.text : "N/A",
        outsideImageUrl: p1.secure_url,
        insideImageUrl:  p2.secure_url
      })
    });
    const session = await res.json();
    if (session.url) location.href = session.url;
    else throw new Error(session.error || "Checkout error");

  } catch (err) {
    console.error(err);
    alert("Something went wrong: " + err.message);
  } finally {
    btn.disabled = false; btn.innerText = "Buy Now";
  }
}

async function uploadToCloudinary(dataUrl) {
  const fd = new FormData();
  fd.append("file", dataUrl);
  fd.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
  const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method:"POST", body: fd });
  return r.json();
}

function download(dataUrl, filename) {
  const a = document.createElement("a");
  a.href = dataUrl; a.download = filename; a.click();
}
</script>
</body>
</html>
